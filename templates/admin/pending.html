{% extends "base.html" %}
{% block title %}가입 승인 · The Feel Intranet{% endblock %}
{% block content %}
<h2 class="page-title">가입 승인 처리</h2>

<div class="doc-meta">
  <span><b>신청자</b> {{ u['name'] }}</span>
  <span><b>전화번호</b> {{ u['phone'] or '-' }}</span>
  <span><b>신청일</b> {{ u['created_at'][:16] }}</span>
</div>

<form method="post" class="form">
  <p class="muted" style="margin-top:0">승인하면서 아래 정보를 지정하세요. ID는 변경할 수 있습니다.</p>
  <div class="row two">
    <div><label>ID (로그인 아이디)</label><input type="text" name="username" value="{{ u['username'] }}" required></div>
    <div>
      <label>권한</label>
      <select name="role"><option value="employee">직원</option><option value="admin">관리자</option></select>
    </div>
  </div>
  <div class="row two">
    <div><label>부서</label><input type="text" name="dept" placeholder="예: 영업부"></div>
    <div><label>직급</label><input type="text" name="position" placeholder="예: 대리"></div>
  </div>
  <div class="row two">
    <div><label>입사일</label><input type="date" name="hire_date"></div>
    <div><label>연간 연차(일)</label><input type="number" step="0.5" name="annual_leave" value="15"></div>
  </div>
  <div class="actions">
    <button name="action" value="approve" class="btn primary">승인</button>
    <button name="action" value="reject" class="btn danger"
            onclick="return confirm('가입을 거절할까요?')">거절</button>
    <a href="{{ url_for('admin_users') }}" class="btn">취소</a>
  </div>
</form>
{% endblock %}
