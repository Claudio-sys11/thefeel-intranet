{% extends "base.html" %}
{% block title %}메일 쓰기 · The Feel Intranet{% endblock %}
{% block content %}
<div class="page-head">
  <h2 class="page-title">메일 쓰기</h2>
  {% if current_user['role']=='admin' %}<a href="{{ url_for('admin_smtp') }}" class="btn">⚙ 외부 메일 설정</a>{% endif %}
</div>
<form method="post" class="form" enctype="multipart/form-data">
  <div class="row">
    <label>발신자</label>
    <input type="text" value="{{ current_user['name'] }}{% if current_user['dept'] %} · {{ current_user['dept'] }}{% endif %}{% if current_user['position'] %} {{ current_user['position'] }}{% endif %} (본인)" disabled>
  </div>
  <div class="row">
    <label>수신 <small>(필수 · 여러 명 선택 Ctrl/Shift)</small></label>
    <select name="to" multiple size="5">
      {% for u in users %}<option value="{{ u['id'] }}">{{ u['name'] }} · {{ u['dept'] or '-' }} {{ u['position'] or '' }}</option>{% endfor %}
    </select>
  </div>
  <div class="row">
    <label>참조 (CC) <small>(선택)</small></label>
    <select name="cc" multiple size="4">
      {% for u in users %}<option value="{{ u['id'] }}">{{ u['name'] }} · {{ u['dept'] or '-' }} {{ u['position'] or '' }}</option>{% endfor %}
    </select>
  </div>
  <div class="row">
    <label>숨은참조 (BCC) <small>(선택 · 다른 수신자에게 보이지 않음)</small></label>
    <select name="bcc" multiple size="4">
      {% for u in users %}<option value="{{ u['id'] }}">{{ u['name'] }} · {{ u['dept'] or '-' }} {{ u['position'] or '' }}</option>{% endfor %}
    </select>
  </div>
  <div class="row two">
    <div><label>외부 수신 (이메일) <small>(쉼표로 구분)</small></label>
      <input type="text" name="ext_to" value="{{ form.get('ext_to','') }}" placeholder="예: abc@gmail.com, def@company.com"></div>
    <div><label>외부 참조 (이메일) <small>(선택)</small></label>
      <input type="text" name="ext_cc" value="{{ form.get('ext_cc','') }}" placeholder="예: cc@company.com"></div>
  </div>
  {% if not smtp_on %}<p class="hint" style="text-align:left;color:#b45309">※ 외부 발송은 관리자가 <b>외부 메일 설정(SMTP)</b>을 등록해야 작동합니다. 사내 수신은 그대로 가능합니다.</p>{% endif %}
  <div class="row"><label>제목</label><input type="text" name="subject" value="{{ form.get('subject','') }}" required></div>
  <div class="row"><label>파일 첨부 <small>(여러 개 가능)</small></label><input type="file" name="attachments" multiple></div>
  <div class="row"><label>내용</label><textarea name="body" rows="11">{{ form.get('body','') }}</textarea></div>
  <div class="actions">
    <button class="btn primary">보내기</button>
    <a href="{{ url_for('mail_inbox') }}" class="btn">취소</a>
  </div>
</form>
{% endblock %}
