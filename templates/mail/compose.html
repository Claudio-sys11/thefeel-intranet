{% extends "base.html" %}
{% block title %}메일 쓰기 · The Feel Intranet{% endblock %}
{% block content %}
<div class="page-head">
  <h2 class="page-title">메일 쓰기</h2>
  {% if current_user['role']=='admin' %}<a href="{{ url_for('admin_smtp') }}" class="btn">⚙ 외부 메일 설정</a>{% endif %}
</div>
<form method="post" class="form form-lr" enctype="multipart/form-data">
  <div class="lr-row">
    <label>발신</label>
    <div class="lr-field">
      <input type="text" value="{{ current_user['name'] }}{% if current_user['dept'] %} · {{ current_user['dept'] }}{% endif %}{% if current_user['position'] %} {{ current_user['position'] }}{% endif %} (본인)" disabled>
    </div>
  </div>
  <div class="lr-row">
    <label>수신 <small>필수</small></label>
    <div class="lr-field"><div class="recip-field" id="rf-to"><input type="text" class="recip-input" placeholder="이름 검색 또는 이메일 입력 후 Enter" autocomplete="off"><div class="suggest" id="sg-to"></div></div></div>
  </div>
  <div class="lr-row">
    <label>참조 <small>CC</small></label>
    <div class="lr-field"><div class="recip-field" id="rf-cc"><input type="text" class="recip-input" placeholder="이름 검색 또는 이메일 입력" autocomplete="off"><div class="suggest" id="sg-cc"></div></div></div>
  </div>
  <div class="lr-row">
    <label>숨은참조 <small>BCC</small></label>
    <div class="lr-field"><div class="recip-field" id="rf-bcc"><input type="text" class="recip-input" placeholder="이름 검색 또는 이메일 입력" autocomplete="off"><div class="suggest" id="sg-bcc"></div></div></div>
  </div>
  <div class="lr-row"><label>제목</label><div class="lr-field"><input type="text" name="subject" value="{{ form.get('subject','') }}" required></div></div>
  <div class="lr-row"><label>파일 첨부 <small>여러 개 가능</small></label><div class="lr-field"><input type="file" name="attachments" multiple></div></div>
  <div class="lr-row"><label>내용</label><div class="lr-field"><textarea name="body" rows="11">{{ form.get('body','') }}</textarea></div></div>
  {% if not smtp_on %}<p class="lr-note">※ 외부(이메일) 발송은 관리자가 <b>외부 메일 설정(SMTP)</b>을 등록해야 작동합니다. 사내 직원에게는 그대로 전송됩니다.</p>{% endif %}
  <div class="actions">
    <button class="btn primary">보내기</button>
    <a href="{{ url_for('mail_inbox') }}" class="btn">취소</a>
  </div>
</form>

<script>
var USERS = [{% for u in users %}{id:{{ u['id'] }},name:"{{ u['name']|e }}",dept:"{{ (u['dept'] or '')|e }}",pos:"{{ (u['position'] or '')|e }}"}{{ ',' if not loop.last }}{% endfor %}];
function initRecip(field){
  var wrap=document.getElementById('rf-'+field);
  var input=wrap.querySelector('.recip-input');
  var sug=document.getElementById('sg-'+field);
  var chosen={};
  function chip(label,inputName,val,cls,key){
    if(chosen[key])return; chosen[key]=1;
    var c=document.createElement('span'); c.className='chip'+(cls?' '+cls:'');
    var x=document.createElement('span'); x.className='x'; x.textContent='✕';
    x.onclick=function(){c.remove();delete chosen[key];};
    var h=document.createElement('input'); h.type='hidden'; h.name=inputName; h.value=val;
    var t=document.createElement('span'); t.innerHTML=label;
    c.appendChild(t); c.appendChild(h); c.appendChild(x);
    wrap.insertBefore(c,input);
  }
  function addUser(u){ chip(u.name+' <small>'+(u.dept||'')+'</small>', field, u.id, '', 'u'+u.id); }
  function addEmail(e){ chip(e, 'ext_'+field, e, 'ext', 'e'+e.toLowerCase()); }
  function close(){ sug.style.display='none'; sug.innerHTML=''; }
  function show(q){
    sug.innerHTML=''; var ql=q.toLowerCase();
    if(!ql){close();return;}
    var m=USERS.filter(function(u){return u.name.toLowerCase().indexOf(ql)>=0||(u.dept||'').toLowerCase().indexOf(ql)>=0;}).slice(0,8);
    if(!m.length){close();return;}
    m.forEach(function(u){
      var o=document.createElement('div'); o.className='opt';
      o.innerHTML='<b>'+u.name+'</b> <small>'+(u.dept||'')+' '+(u.pos||'')+'</small>';
      o.onmousedown=function(ev){ev.preventDefault();addUser(u);input.value='';close();};
      sug.appendChild(o);
    });
    sug.style.display='block';
  }
  input.addEventListener('input',function(){show(input.value.trim());});
  input.addEventListener('keydown',function(e){
    if(e.key==='Enter'||e.key===','){
      e.preventDefault();
      var v=input.value.trim().replace(/,$/,'').trim(); if(!v)return;
      if(v.indexOf('@')>=0){ addEmail(v); input.value=''; close(); return; }
      var ql=v.toLowerCase();
      var ex=USERS.filter(function(u){return u.name.toLowerCase()===ql;});
      var pa=USERS.filter(function(u){return u.name.toLowerCase().indexOf(ql)>=0;});
      if(ex.length){addUser(ex[0]);} else if(pa.length===1){addUser(pa[0]);}
      input.value=''; close();
    } else if(e.key==='Backspace' && !input.value){
      var chips=wrap.querySelectorAll('.chip'); if(chips.length){chips[chips.length-1].querySelector('.x').click();}
    }
  });
  input.addEventListener('blur',function(){setTimeout(close,150);});
}
['to','cc','bcc'].forEach(initRecip);
</script>
{% endblock %}
