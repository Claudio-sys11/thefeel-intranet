{% extends "base.html" %}
{% block title %}로그인 · The Feel Intranet{% endblock %}
{% block content %}
<div class="login-wrap">
  <button class="popup-close" onclick="closeApp()" title="닫기">✕</button>
  <div class="login-card">
    <img src="{{ url_for('static', filename='logo.svg') }}" alt="The Feel" class="login-logo">
    <h1 class="wordmark">THE&nbsp;FEEL</h1>
    <p class="sub">Intranet · 사내 업무 포털</p>
    <form method="post" id="loginform">
      <label>아이디 <small>(대문자)</small></label>
      <input type="text" name="username" id="f-user" autocapitalize="characters"
             oninput="this.value=this.value.toUpperCase()" autofocus required>
      <label>비밀번호</label>
      <input type="password" name="password" id="f-pw" required>
      <div class="remember-row">
        <label class="rmb"><input type="checkbox" id="rmb-id"> 아이디 기억</label>
        <label class="rmb"><input type="checkbox" id="rmb-pw"> 비밀번호 기억</label>
      </div>
      <button type="submit" class="btn primary full">로그인</button>
    </form>
    <p class="signup-cta">아직 계정이 없으신가요? <a href="{{ url_for('signup') }}">회원가입</a></p>
    <div class="ver-check" id="ver-check">최신 버전 확인 중…</div>
    <div class="connect-link"><a href="{{ url_for('connect_settings') }}">🖥 서버 연결 설정</a></div>
  </div>
  <div class="popup-footer">
    <div class="company">THE FEEL KOREA CO.,LTD.</div>
    <div class="credit">Created by Claudio Lim</div>
  </div>
</div>
<script>
function closeApp(){ try{ if(window.pywebview&&pywebview.api&&pywebview.api.close_app){pywebview.api.close_app();return;} }catch(e){} window.close(); }

// 아이디/비밀번호 기억
(function(){
  var u=document.getElementById('f-user'), p=document.getElementById('f-pw'),
      rid=document.getElementById('rmb-id'), rpw=document.getElementById('rmb-pw');
  try{
    var sid=localStorage.getItem('tfi_id'); if(sid){ u.value=sid.toUpperCase(); rid.checked=true; }
    var spw=localStorage.getItem('tfi_pw'); if(spw){ p.value=spw; rpw.checked=true; }
  }catch(e){}
  if(u.value && !p.value){ p.focus(); }
  document.getElementById('loginform').addEventListener('submit', function(){
    try{
      if(rid.checked) localStorage.setItem('tfi_id', u.value); else localStorage.removeItem('tfi_id');
      if(rpw.checked) localStorage.setItem('tfi_pw', p.value); else localStorage.removeItem('tfi_pw');
    }catch(e){}
  });
})();

// 최신 버전 체크 + 로그인 팝업에서 바로 업데이트
(function(){
  var el=document.getElementById('ver-check');
  function check(){
    fetch('/update/public_status').then(function(r){return r.json()}).then(function(s){
      if(s.available){
        el.className='ver-check has';
        var btn = (s.is_local && s.frozen)
          ? ' <button type="button" id="upd-btn" class="upd-btn">지금 업데이트</button>'
          : '';
        el.innerHTML='🆕 새 버전 <b>v'+s.latest+'</b> 사용 가능'+btn+
          '<div id="upd-prog" class="upd-prog" style="display:none">'+
          '<div class="upd-track"><div id="upd-fill" class="upd-fill"></div></div>'+
          '<span id="upd-pct">0%</span></div>';
        var b=document.getElementById('upd-btn'); if(b) b.addEventListener('click', startUpdate);
        return;
      }
      // 최신이거나 아직 확인 중 → 현재 버전을 바로 표시(대기 없음). 확인 안 끝났으면 백그라운드로 계속 확인.
      el.className='ver-check ok'; el.innerHTML='✓ 최신 버전 <b>v'+s.current+'</b>';
      if(!s.checked){ setTimeout(check, 2000); }
    }).catch(function(){ el.textContent='버전 확인 실패'; });
  }
  function startUpdate(){
    if(!confirm('지금 새 버전을 설치하고 재시작할까요?\n(이전 버전 자동 제거 · 데이터 보존)')) return;
    var b=document.getElementById('upd-btn'); if(b){ b.disabled=true; b.style.display='none'; }
    var pr=document.getElementById('upd-prog'); if(pr) pr.style.display='inline-flex';
    fetch('/update/apply',{method:'POST'}).then(function(r){return r.json()}).then(function(d){
      if(d.ok){ poll(); } else { el.innerHTML='⚠ '+(d.error||'업데이트 불가'); }
    }).catch(function(){ poll(); });
  }
  function poll(){
    fetch('/update/progress').then(function(r){return r.json()}).then(function(p){
      var fill=document.getElementById('upd-fill'), pct=document.getElementById('upd-pct');
      if(p.state==='downloading'){ if(fill)fill.style.width=p.percent+'%'; if(pct)pct.textContent=p.percent+'%'; setTimeout(poll,400); }
      else if(p.state==='installing'){ if(fill)fill.style.width='100%'; if(pct)pct.textContent='설치 중'; setTimeout(poll,800); }
      else if(p.state==='error'){ el.innerHTML='⚠ '+(p.message||'업데이트 실패'); }
      else { setTimeout(poll,600); }
    }).catch(function(){ var pct=document.getElementById('upd-pct'); if(pct)pct.textContent='재시작 중…'; });
  }
  check();
})();
</script>
{% endblock %}
