{% extends "base.html" %}
{% block title %}로그인 · 더필 인트라넷{% endblock %}
{% block content %}
<div class="login-wrap">
  <div class="login-card">
    <img src="{{ url_for('static', filename='logo.svg') }}" alt="더필코리아" class="login-logo">
    <h1>더필코리아 인트라넷</h1>
    <p class="sub">사내 업무 포털에 로그인하세요</p>
    <form method="post">
      <label>아이디</label>
      <input type="text" name="username" autofocus required>
      <label>비밀번호</label>
      <input type="password" name="password" required>
      <button type="submit" class="btn primary full">로그인</button>
    </form>
    <p class="hint">최초 관리자 계정: <b>admin / admin1234</b></p>
  </div>
</div>
{% endblock %}
